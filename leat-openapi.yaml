openapi: 3.0.0
info:
  title: Public API
  description: |-
    <html><head></head><body><p>Welcome to the Leat API documentation.</p>
    <p>The Postman Docs are mainly for testing purposes. Please refer to our</p>
    <p><a href="https://docs.leat.com">Leat API Documentation</a></p>
    <p>for guides, explanations and any other questions you may have.</p>
    <p>Good luck!</p>
    <hr>
    </body></html>
  version: 1.0.0
servers:
  - url: https://api.leat.com
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    noauthAuth:
      type: http
      scheme: noauth
tags:
  - name: OAuth v3
    description: >
      <p>Use the OAuth Client Credentials Grant to allow for server-to-server
      communication. This involves handling requesting access tokens and
      refreshing your own token.</p>

