    post:
      tags:
        - OAuth v3 > Clients > Contact Attributes
      summary: Create Contact Attributes
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: favorite_color728912
                label: Your Favorite Color
                description: some description
                data_type: select
                options:
                  - label: Blue
                    value: 100
                  - label: Red
                    value: 200
                  - label: Yellow
                    value: 300
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          headers:
            Host:
              schema:
                type: string
                example: 127.0.0.1:8001
            Date:
              schema:
                type: string
                example: Fri, 10 Nov 2023 14:47:36 GMT
            Connection:
              schema:
                type: string
                example: close
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.4.33
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Content-Type:
              schema:
                type: string
                example: application/json
            X-RateLimit-Limit:
              schema:
                type: integer
                example: "5000"
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: "4998"
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Expose-Headers:
              schema:
                type: string
                example: Authorization
          content:
            application/json:
              schema:
                type: object
              example:
                data:
                  id: 2233
                  name: favorite_color728912
                  label: Your Favorite Color
                  type: select
                  group_name: null
                  group:
                    id: 140
                    name: profile
