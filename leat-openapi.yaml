  /oauth/clients/credit-receptions:
    post:
      tags:
        - OAuth v3 > Clients > Credit Receptions
      summary: Create Credit Reception
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contact_uuid:
                  type: string
                  description: |
                    <p>(string, required) Contact UUID</p>
                  example: "{{contact_uuid}}"
                shop_uuid:
                  type: string
                  description: >
                    <p>(string, required) - A valid shop uuid for the user; Get
                    the list using the /shops resource</p>
                  example: "{{shop_uuid}}"
                credits:
                  type: integer
                  description: >
                    <p>(number, required if unit_value not set) The number of
                    credits to be given, overrides loyalty rules if set on
                    program</p>
                  example: "10"
                unit_value:
                  type: integer
                  description: >
                    <p>(number, required if credits not set) - The value for
                    which credits are to be given, subject to loyalty rules if
                    set on program</p>
                  example: "10"
                contact_identifier_value:
                  type: string
                  description: >
                    <p>(string, optional) The value of the identifier (e.g., the
                    loyalty card's hash)</p>
                  example: mijn-identifier41
                pos_transaction_uuid:
                  type: string
                  description: >
                    <p>(string, optional) The POS transaction UUID that you want
                    to link the credit reception to</p>
                  example: 1234567-abcd
                unit_name:
                  type: string
                  description: >
                    <p>(number, required if credits not set) - The name of the
                    unit linked to the value</p>
                  example: purchase_amount
      security:
        - noauthAuth: []
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{api_key}}
      responses:
        "200":
          description: OK
          headers:
            Host:
              schema:
                type: string
                example: 127.0.0.1:8001
            Date:
