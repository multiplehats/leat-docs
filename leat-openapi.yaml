  /oauth/clients/contact-identifiers:
    post:
      tags:
        - OAuth v3 > Clients > Contact Identifiers
      summary: Create Identifier
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contact_identifier_value:
                  type: string
                  description: >
                    <p>(string, required) The value of the identifier (e.g., the
                    loyalty card's hash)</p>
