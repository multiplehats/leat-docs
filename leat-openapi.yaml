        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: |
                    <p>(email,  required) The member's email address</p>
                  example: new_contact@piggy.eu
      security:
        - noauthAuth: []
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{api_key}}
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
