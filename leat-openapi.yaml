paths:
  /oauth/clients/automations:
    get:
      tags:
        - OAuth v3 > Clients > Automations
      summary: List Automations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          headers:
            Host:
              schema:
                type: string
                example: 127.0.0.1:8001
            Date:
              schema:
                type: string
                example: Wed, 08 Nov 2023 13:52:17 GMT
            Connection:
              schema:
                type: string
                example: close
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.4.33
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Content-Type:
              schema:
                type: string
                example: application/json
            X-RateLimit-Limit:
              schema:
                type: integer
                example: "5000"
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: "4999"
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Expose-Headers:
              schema:
                type: string
                example: Authorization
          content:
            application/json:
              schema:
                type: object
